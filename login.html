<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录 | Wallace Financial Service</title>
    <link rel="stylesheet" href="styles.css?v=20260625-excel-export" />
    <script src="backend-config.js?v=20260625-excel-export"></script>
    <script src="auth.js?v=20260625-excel-export"></script>
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-panel">
        <div class="brand login-brand">
          <span class="brand-mark">WFS</span>
          <div>
            <strong>Wallace Financial Service</strong>
            <small>新媒体市场部</small>
          </div>
        </div>
        <div class="login-copy">
          <p>Marketing Workspace</p>
          <h1>登录后使用网站</h1>
        </div>
        <form id="loginForm" class="login-form">
          <label>
            用户名
            <input id="loginUser" type="email" autocomplete="username" required value="amy.he@wallacewang.ca" />
          </label>
          <label>
            密码
            <input id="loginPassword" type="password" autocomplete="current-password" required />
          </label>
          <p id="loginError" class="login-error" role="alert"></p>
          <button class="primary-btn" type="submit">登录</button>
        </form>
      </section>
    </main>
  </body>
</html>
